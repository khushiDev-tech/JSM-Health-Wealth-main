<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Map with Scroll Footer</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
    }

    /* Map full screen */
    .map-container {
      height: 100vh;
      width: 100%;
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Extra content for scroll */
    .content {
      height: 600px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    /* Footer hidden initially */
    footer {
      background: #222;
      color: #fff;
      text-align: center;
      padding: 30px;
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.5s ease;
    }

    /* Show footer on scroll */
    footer.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <!-- Google Map -->
  <div class="map-container">
    <iframe 
      src="https://www.google.com/maps?q=Bhopal&output=embed">
    </iframe>
  </div>

  <!-- Scroll content -->
  <div class="content">
    Scroll Down 👇
  </div>

  <!-- Footer -->
  <footer id="footer">
    <h2>Footer Section</h2>
    <p>This footer appears when you scroll down.</p>
  </footer>

  <script>
    window.addEventListener("scroll", function () {
      let footer = document.getElementById("footer");

      let scrollPosition = window.scrollY + window.innerHeight;
      let pageHeight = document.body.offsetHeight;

      // Show footer when near bottom
      if (scrollPosition > pageHeight - 100) {
        footer.classList.add("show");
      } else {
        footer.classList.remove("show");
      }
    });
  </script>

</body>
</html>
